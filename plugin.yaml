name: camel-security
version: "0.5.2"
manifest_version: 1
description: >-
  Prompt-injection defense for Hermes, as a pure plugin (no core changes):
  (1) audit trail + enforced approval gate for sensitive/irreversible/outbound
  tool actions; (2) web-ingest quarantine that routes web research through
  (3) plan_execute — a CaMeL-lite plan-DAG interpreter with capability/taint
  tracking and a capability-aware sink policy, so untrusted web content can
  influence values but can never redirect control or reach a dangerous sink.
  Generic defaults work out of the box; site recognition — your MCP servers,
  secret files, GUI tools, command rules — goes in <HERMES_HOME>/camel-security.yaml
  (recommended starting file in CONFIGURATION.md), no code. Env prefix CAMEL_SECURITY_*
  (legacy SECURITY_GATE_* still accepted). See CONFIGURATION.md.
author: Ivan Vladymyrov
license: MIT
hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
provides_tools:
  - plan_execute
